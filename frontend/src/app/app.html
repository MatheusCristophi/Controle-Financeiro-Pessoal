<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão Financeira Pessoal</title>
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <header id="header">
    <nav id="nav-header">
      <h1>Gestão Financeira</h1>
      <ul id="ul-header">
        <li class="li-header">Receitas</li>
        <li class="li-header">Despesas</li>
        <li class="li-header">Dashboard</li>
      </ul>
    </nav>
    <button id="logout">Sair</button>
  </header>
  <main>
    <!-- Fazer o html pelo JavaScript -->
    <div id="perfil-user">

      
    </div>
    <div id="dashboard-incomes-expenses">
      <section class="dashboard-card">
        <h1>Gráfico das Despesas</h1>
        <div>
          <label for="Tempo">Mês</label>
          <select name="Tempo" id="option-expense">
            <option value="1m">Mês Atual</option>
            <option value="2m">Mês Anterior</option>
          </select>
        </div>
      </section>
      <section class="dashboard-card">
        <h1>Gráfico das Receitas</h1>
        <div>
          <label for="Tempo">Mês</label>
          <select name="Tempo" id="option-income">
            <option value="1m">Mês Atual</option>
            <option value="2m">Mês Anterior</option>
          </select>
        </div>
      </section>
    </div>
    <div>
      <section class="dashboard-transaction">
        <h1>Transações</h1>
        <div>
          <label for="Tempo">Mês</label>
          <select name="Tempo" id="option-income">
            <option value="1m">Mês Atual</option>
            <option value="2m">Mês Anterior</option>
          </select>
        </div>
      </section>
      <footer>
        <h3>&copy; Matheus Cristophi</h3>
      </footer>
    </div>
  </main>
</body>

</html>
